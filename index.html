<!DOCTYPE html>
<html>
<head>
<title>Birthday Surprise ❤️</title>

<style>
body {
    margin:0;
    font-family: Arial;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    color:white;
}

.container {
    margin-top:100px;
    animation: fade 1.5s;
}

@keyframes fade {
    from {opacity:0;}
    to {opacity:1;}
}

button {
    padding:12px 20px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:25px;
    cursor:pointer;
    background:#ff4d6d;
    color:white;
    transition:0.3s;
}

button:hover {
    transform: scale(1.1);
}

</style>
</head>

<body>

<div class="container" id="content">
    <h1>Hey you 😏</h1>
    <p>Ready for your birthday surprise?</p>
    <button onclick="q1()">Yes 😌</button>
    <button onclick="tease()">No 😒</button>
</div>

<script>

function tease(){
    document.getElementById("content").innerHTML = `
    <h1>Seriously? 😒</h1>
    <p>You HAVE to click yes 😏</p>
    <button onclick="q1()">Okay okay 😭</button>
    `;
}

function q1(){
    document.getElementById("content").innerHTML = `
    <h1>Question 1 💖</h1>
    <p>Do you love me?</p>
    <button onclick="q2()">Yes ❤️</button>
    <button onclick="wrong()">No 😑</button>
    `;
}

function q2(){
    document.getElementById("content").innerHTML = `
    <h1>Question 2 😏</h1>
    <p>Who loves more?</p>
    <button onclick="q3()">Me 😌</button>
    <button onclick="q3()">You 🥺</button>
    `;
}

function q3(){
    document.getElementById("content").innerHTML = `
    <h1>Question 3 💫</h1>
    <p>Am I your favorite person?</p>
    <button onclick="final()">Obviously ❤️</button>
    <button onclick="wrong()">No 🙄</button>
    `;
}

function wrong(){
    document.getElementById("content").innerHTML = `
    <h1>Wrong answer 😒</h1>
    <p>Try again properly 😏</p>
    <button onclick="q1()">Retry 💖</button>
    `;
}

function final(){
    document.getElementById("content").innerHTML = `
    <h1>Happy Birthday My Love ❤️</h1>
    <p>You passed my love test and here is a small gift for you my love😌</p>
    <p>I’m so lucky to have you in my life 🥺💖</p>
    <h2>Forever yours and always with you stay blessed❤️</h2>
    `;
}

</script>

</body>
</html>
